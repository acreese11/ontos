name: Claude PR review (dais)

on:
  pull_request:
    branches: [dais]
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: write
  issues: write
  id-token: write

jobs:
  review:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Claude review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # track_progress creates a sticky tracking comment AND enables the
          # GitHub comment tools (update_claude_comment + create_inline_comment)
          # so the agent can actually publish its review on pull_request events.
          # Without it, the agent reviews but has no tool to post — the run
          # succeeds silently and "No buffered inline comments" appears in logs.
          track_progress: true
          # Critical-review prompt; biased toward signal over nits.
          prompt: |
            Review PR #${{ github.event.pull_request.number }} in
            ${{ github.repository }}. Post your findings as inline review
            comments on the specific lines, plus update the tracking comment
            with the summary.

            You are reviewing a PR into the `dais` branch of the ontos fork
            (DAIS 2026 "Safe Skies" demo build on top of databrickslabs/ontos,
            Apache 2.0; full conventions in CLAUDE.md at the repo root).

            The reviewer is an expert (RSA at Databricks). They want peer-level
            pushback, not nits. They will admin-bypass false positives, so be
            high-precision: it's better to flag 3 real issues than 12 mixed ones.

            ## Output format

            Post a single sticky summary comment, plus inline comments on the
            specific lines that need action. Start the summary with one of:
              - "LGTM" if no actionable findings
              - "Critical findings: N, Suggestions: M" otherwise

            Each inline comment should state the issue, a one-sentence WHY,
            and a one-line fix suggestion. Use file:line refs.

            ## Look for, in priority order

            ### 1. Security
              - Missing `Depends(PermissionChecker(...))` on routes that touch
                managers (compare to sibling routes in same file)
              - Privilege escalation: code paths that obtain `WorkspaceClient`
                via `get_workspace_client(settings)` (SP) when an end-user
                request should be using OBO (`x-forwarded-access-token` from
                request headers). Pattern: extract user_token in the route,
                thread it through to manager → llm_client / SDK call.
              - SQL injection: any `f"...{var}..."` interpolation of caller-
                or LLM-supplied identifiers into a SQL string. Validate against
                `^[A-Za-z0-9_]+$` or backtick-quote.
              - Prompt injection: LLM prompts that concatenate UC table/column
                comments (or other attacker-influenced text) without
                truncation/sanitization
              - Request-body-supplied URLs/hosts that feed into outbound HTTP
                (SSRF). Especially anything reaching `get_workspace_client`'s
                token endpoint.
              - Secrets in YAML, scripts, or log statements
              - Identifier sanitization that bypasses reserved-keyword checks
                (see src/backend/src/common/unity_catalog_utils.py)

            ### 2. Correctness
              - Transaction boundaries: managers that call `db.commit()`
                internally while routes also try to `db.rollback()` — those
                rollbacks are no-ops. Either commit at the route or at the
                manager, never both.
              - Timezone-aware vs naive datetime comparisons (`naive >= aware`
                raises TypeError silently caught upstream → 0 results)
              - N+1 queries inside `for product in list_...` loops; prefer a
                single bulk fetch + dict lookup
              - Mass-assignment in create/update: `data_dict = body.model_dump()`
                without an explicit allow-list
              - Idempotency in seeders: `_ensure_*` guards that short-circuit
                on existence-check but never refresh stale denormalized fields
              - Alembic single-head invariant (`scripts/check-alembic-heads.py`).
                If two heads, label PR `alembic-branch` only after writing a
                merge migration.

            ### 3. Architecture / upstream-divergence
              - Layering: routes own auth + orchestration; managers own
                business logic; repositories own pure CRUD. Repos importing
                sibling repos = smell.
              - Pattern divergence: if a sibling route in the same file does
                `Depends(PermissionChecker(FEATURE_ID, FeatureAccessLevel.X))`,
                the new route should too.
              - Search registration: new SearchableAsset implementers need
                `@searchable_asset` decorator and registry entry.
              - DAIS-demo-specific defaults leaking into shared code (e.g.,
                `hubLabel='Safe Skies'`, `current_user='alan.reese@databricks.com'`).
                Flag for upstream-PR removal but don't block.

            ### 4. DQX / federated quality
              - Custom `quality` rules belong in each schema's `quality:` list,
                NOT under top-level `qualityRules`. DQX 0.14 only reads per-
                schema lists.
              - DQX rules need `user_metadata.schema` set when multi-schema
                contracts use schema-scoped filters.
              - `physical_name` must be `catalog.schema.table` (3 parts); fewer
                parts crash the workflow.

            ## Skip
              - Style nits, formatting, naming taste
              - "Could also add..." suggestions beyond PR scope
              - Documentation phrasing unless docs are actively wrong
              - Test coverage gaps unless the change is security-sensitive
              - Generated files (yarn.lock, requirements.txt, i18n)

            ## Be honest
            - If the PR is small and clean, say "LGTM" and stop. Don't pad.
            - If a finding is uncertain ("might be" / "could be"), flag it as
              a Suggestion, not Critical.
            - If you can't tell whether a callsite handles something correctly
              from the diff alone, ask — don't assume the worst.
