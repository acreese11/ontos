bundle:
  name: ontos

# Keep the file count under Databricks Apps' deploy listing cap (~1m timeout).
# frontend/node_modules and __pycache__ alone are 45k+ files.
sync:
  exclude:
    - "frontend/node_modules/**"
    - "frontend/.vite/**"
    - "**/__pycache__/**"
    - "**/*.pyc"
    - "**/.DS_Store"
    - "**/node_modules/**"
    - "**/coverage/**"
    - "**/.pytest_cache/**"
    - "**/.ruff_cache/**"
    - "frontend/static/**"
    - ".env"
    - ".env.local"
    - "backend/.env"

variables:
  sql_warehouse_id:
    description: "ID of the SQL warehouse to use"
    lookup:
      warehouse: "default"
  catalog_name:
    description: "Name of the catalog to use"
    default: "app_data"
  schema_name:
    description: "Name of the schema to use"
    default: "app_ontos"
  volume_name:
    description: "Name of the volume to use"
    default: "app_files"
  lakebase_instance_name:
    description: "Name of the Lakebase Postgres instance"
    default: "ontosdb"
  serving_endpoint_name:
    description: "Name of the LLM serving endpoint"
    default: "databricks-claude-sonnet-4-5"

resources:
  apps:
    ontos:
      name: "ontos"
      description: "Ontos"
      source_code_path: "."
      # Note: app command + runtime env live in src/app.yaml (read by the
      # Apps platform at app start). The bundle's apps.<name>.config field
      # is silently dropped by databricks bundle deploy (warns "unknown
      # field: config"), so any command/env declared here would be ignored.
      # Bundle variables (catalog_name, schema_name, etc.) flow into the
      # resources block below; src/app.yaml uses valueFrom: "<resource>" to
      # read bound values at runtime.
      #
      # User-delegated OAuth scopes the app needs to call Databricks APIs
      # on behalf of the logged-in user. Without these, features like
      # Schema Importer and AI-assisted contract authoring fail at the
      # SDK layer with a misleading
      #   "Provided OAuth token does not have required scopes: unity-catalog"
      # which actually means "this token doesn't carry any of the granular
      # catalog.* scopes." Declaring the granular scopes below is the fix —
      # the legacy aggregate scope cannot be declared at all.
      #
      # This set MUST match the marketplace `manifest.yaml` (excluding the
      # platform-injected `iam.*` defaults, which the update API rejects if
      # declared here). CI enforces parity via
      # scripts/check-user-api-scopes-parity.py.
      user_api_scopes:
        - "sql"
        - "serving.serving-endpoints"
        - "files.files"
        - "dashboards.genie"
        - "catalog.connections"
        - "catalog.catalogs:read"
        - "catalog.schemas:read"
        - "catalog.tables:read"
      resources:
        - name: "sql-warehouse"
          description: "SQL warehouse for the app"
          sql_warehouse:
            id: ${var.sql_warehouse_id}
            permission: "CAN_USE"
        - name: "database"
          description: "Lakebase database for app metadata"
          database:
            database_name: "databricks_postgres"
            instance_name: ${var.lakebase_instance_name}
            permission: "CAN_CONNECT_AND_CREATE"
        - name: "serving-endpoint"
          description: "LLM serving endpoint for AI features"
          serving_endpoint:
            name: ${var.serving_endpoint_name}
            permission: "CAN_QUERY"
        - name: "volume"
          description: "Volume for app file storage"
          uc_securable:
            securable_full_name: "${var.catalog_name}.${var.schema_name}.${var.volume_name}"
            securable_type: "VOLUME"
            permission: "WRITE_VOLUME"
      permissions:
        - user_name: "*"
          level: "CAN_USE"

targets:
  dev:
    variables:
      catalog_name: "app_data_dev"
      schema_name: "app_ontos_dev"
      volume_name: "app_files_dev"
  prod:
    variables:
      catalog_name: "app_data_prod"
      schema_name: "app_ontos_prod"
      volume_name: "app_files_prod"
  dais-aws:
    workspace:
      host: https://fevm-classic-stable-cy82rl.cloud.databricks.com
    variables:
      sql_warehouse_id: "27c7b0f923579921"
      catalog_name: "safe_skies"
      schema_name: "app_ontos"
      volume_name: "app_files"
      lakebase_instance_name: "ontosdb"
      serving_endpoint_name: "databricks-claude-opus-4-7"
